name: Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --stacktrace assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codexterm-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Decode release keystore
        if: ${{ secrets.CODEXTERM_UPLOAD_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.CODEXTERM_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/codexterm-upload.jks"

      - name: Build signed release APK
        if: ${{ secrets.CODEXTERM_UPLOAD_KEYSTORE_BASE64 != '' && secrets.CODEXTERM_UPLOAD_STORE_PASSWORD != '' && secrets.CODEXTERM_UPLOAD_KEY_ALIAS != '' && secrets.CODEXTERM_UPLOAD_KEY_PASSWORD != '' }}
        env:
          CODEXTERM_UPLOAD_STORE_FILE: ${{ runner.temp }}/codexterm-upload.jks
          CODEXTERM_UPLOAD_STORE_PASSWORD: ${{ secrets.CODEXTERM_UPLOAD_STORE_PASSWORD }}
          CODEXTERM_UPLOAD_KEY_ALIAS: ${{ secrets.CODEXTERM_UPLOAD_KEY_ALIAS }}
          CODEXTERM_UPLOAD_KEY_PASSWORD: ${{ secrets.CODEXTERM_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew --stacktrace assembleRelease

      - name: Upload release APK
        if: ${{ secrets.CODEXTERM_UPLOAD_KEYSTORE_BASE64 != '' && secrets.CODEXTERM_UPLOAD_STORE_PASSWORD != '' && secrets.CODEXTERM_UPLOAD_KEY_ALIAS != '' && secrets.CODEXTERM_UPLOAD_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: codexterm-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
